kind = "web"
previewPath = "/"
title = "Smart Assistant"
version = "1.0.0"
id = "artifacts/smart-assistant"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21357

[services.development]
run = "pnpm --filter @workspace/smart-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-assistant", "run", "build" ]
serve = "static"
publicDir = "artifacts/smart-assistant/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21357"
BASE_PATH = "/"
